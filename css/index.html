<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #3bc7ab, lch(97.73% 0.7 18.53));
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .converter {
        background: #f6f4f4fe;
        padding: 40px;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .converter h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
        color: #555;
    }

    input, select, button {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        margin-top: 15px;
        cursor: pointer;
        background-color: #4CAF50;
        color: white;
        border: none;
    }

    button:hover {
        background-color: #45a049;
    }

    .reset-btn {
        background-color: #f44336;
    }

    .reset-btn:hover {
        background-color: #d32f2f;
    }

    .result {
        margin-top: 20px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #222;
        background: #c6e1e2;
        padding: 12px;
        border-radius: 8px;
    }

    @media (max-width: 480px) {
        .converter {
            width: 90%;
        }
    }
</style>
</head>

<body>

<div class="converter">
    <h2>🌡️ Temperature Converter</h2>

    <label for="temperature">Enter Temperature</label>
    <input type="number" id="temperature" placeholder="Enter value">

    <label for="fromUnit">From</label>
    <select id="fromUnit">
        <option value="C">Celsius</option>
        <option value="F">Fahrenheit</option>
        <option value="K">Kelvin</option>
    </select>

    <label for="toUnit">To</label>
    <select id="toUnit">
        <option value="F">Fahrenheit</option>
        <option value="C">Celsius</option>
        <option value="K">Kelvin</option>
    </select>

    <button onclick="convertTemperature()">Convert</button>
    <button class="reset-btn" onclick="resetFields()">Reset</button>

    <div class="result" id="result">
        Converted temperature will appear here
    </div>
</div>

<script>
function convertTemperature() {
    const temp = document.getElementById("temperature").value;
    const from = document.getElementById("fromUnit").value;
    const to = document.getElementById("toUnit").value;
    const resultDiv = document.getElementById("result");

    if (temp === "") {
        resultDiv.innerText = "❌ Please enter a temperature value.";
        return;
    }

    let value = parseFloat(temp);
    let converted;

    if (from === to) {
        converted = value;
    } else if (from === "C" && to === "F") {
        converted = (value * 9/5) + 32;
    } else if (from === "F" && to === "C") {
        converted = (value - 32) * 5/9;
    } else if (from === "C" && to === "K") {
        converted = value + 273.15;
    } else if (from === "K" && to === "C") {
        converted = value - 273.15;
    } else if (from === "F" && to === "K") {
        converted = (value - 32) * 5/9 + 273.15;
    } else if (from === "K" && to === "F") {
        converted = (value - 273.15) * 9/5 + 32;
    }

    resultDiv.innerText = `✅ Result: ${converted.toFixed(2)} °${to}`;
}

function resetFields() {
    document.getElementById("temperature").value = "";
    document.getElementById("result").innerText = "Converted temperature will appear here";
}
</script>

</body>
</html>
